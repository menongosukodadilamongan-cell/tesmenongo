<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCORE CBT - Seleksi Perangkat Desa</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar untuk layar proyektor */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Animasi Latar Belakang */
        .bg-grid { background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="flex flex-col h-screen bg-grid">

    <!-- HEADER PROYEKTOR -->
    <header class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-5 lg:p-6 flex justify-between items-center shadow-2xl relative z-20 flex-shrink-0">
        <div class="flex items-center gap-5">
            <div class="w-14 h-14 lg:w-16 lg:h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.5)]">
                <i data-feather="monitor" class="w-7 h-7 lg:w-8 lg:h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl lg:text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-lg">LIVE SCORE CBT</h1>
                <p class="text-slate-400 font-bold tracking-widest uppercase text-xs lg:text-sm mt-1" id="header-lembaga">Pemerintah Desa (Memuat...)</p>
            </div>
        </div>
        <div class="text-right bg-slate-950 px-5 py-3 lg:px-6 lg:py-4 rounded-2xl border border-slate-800 shadow-inner">
            <p class="text-[10px] lg:text-xs uppercase font-black tracking-widest text-emerald-500 mb-1 flex items-center justify-end gap-2">
                <span class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></span> SESI UJIAN AKTIF
            </p>
            <h2 class="text-lg lg:text-xl font-black text-white uppercase tracking-wider" id="header-jadwal">MENUNGGU...</h2>
        </div>
    </header>

    <!-- KONTEN UTAMA -->
    <main class="flex-1 overflow-y-auto relative flex flex-col pt-6 pb-12 px-4 lg:px-12">
        <!-- Layar Tunggu (Jika tidak ada ujian aktif) -->
        <div id="screen-waiting" class="absolute inset-0 flex flex-col items-center justify-center z-10 transition-opacity duration-500 bg-[#020617]/80 backdrop-blur-sm">
            <div class="w-32 h-32 bg-slate-800 rounded-full flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(30,41,59,0.8)] relative">
                <div class="absolute inset-0 rounded-full border-4 border-slate-600 border-t-blue-500 animate-spin"></div>
                <i data-feather="radio" class="w-12 h-12 text-slate-400 animate-pulse"></i>
            </div>
            <h2 class="text-3xl lg:text-4xl font-black text-slate-300 tracking-widest drop-shadow-lg">LAYAR STANDBY</h2>
            <p class="text-slate-500 mt-4 font-bold text-lg max-w-lg text-center">Klasemen nilai akan otomatis ditampilkan saat sesi ujian diaktifkan oleh Panitia.</p>
        </div>

        <!-- Leaderboard -->
        <div id="screen-live" class="hidden flex-1 w-full max-w-6xl mx-auto flex flex-col relative z-0">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 bg-slate-800/50 p-6 rounded-3xl border border-slate-700 backdrop-blur-md">
                <div>
                    <h3 class="text-2xl font-black text-white tracking-widest">KLASEMEN NILAI SEMENTARA</h3>
                    <div class="flex items-center gap-4 mt-2">
                        <p class="text-slate-400 font-bold text-sm bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">Formasi: <span id="info-formasi" class="text-emerald-400 uppercase font-black tracking-wider">...</span></p>
                        <p class="text-slate-400 font-bold text-sm bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">Target Soal: <span id="info-soal" class="text-blue-400 font-black font-mono">0</span></p>
                    </div>
                </div>
                <div class="mt-4 sm:mt-0 flex items-center gap-3">
                    <div class="px-4 py-2 rounded-xl bg-blue-900/30 border border-blue-800/50 flex items-center gap-2">
                        <i data-feather="refresh-ccw" class="w-4 h-4 text-blue-400 animate-spin"></i>
                        <span class="text-blue-400 text-xs font-black tracking-widest uppercase">Live Sync</span>
                    </div>
                </div>
            </div>

            <!-- Wadah Kartu Peserta (Relative positioning untuk animasi Absolute) -->
            <!-- Tinggi wadah akan disesuaikan otomatis oleh JS agar bisa di-scroll -->
            <div id="ranking-container" class="relative w-full transition-all duration-500">
                <!-- Kartu Peserta akan di-render di sini via JS -->
            </div>
        </div>
    </main>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // MENGGUNAKAN CONFIG FIREBASE TESMENONGO
        const firebaseConfig = {
            apiKey: "AIzaSyDD-vJo92cadOA0tEoDeMrtdMC3xM6HL0w",
            authDomain: "tesmenongo.firebaseapp.com",
            projectId: "tesmenongo",
            storageBucket: "tesmenongo.firebasestorage.app",
            messagingSenderId: "1060427898803",
            appId: "1:1060427898803:web:cdd192e2a2cf1837b4f5c6",
            measurementId: "G-18XWS2Q85R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'cat-desa-app';
        let userId = null; // Akan otomatis mengambil ID Admin (pembuat data) karena skema anonymous

        let activeJadwal = null;
        let dataPeserta = [];
        let totalSoalDiujikan = 100;
        let unsubProgress = null;

        // Ketinggian per kartu untuk menghitung posisi animasi Y (Tailwind h-24 = 96px + gap 16px = 112px)
        const CARD_HEIGHT = 104; 

        feather.replace();
        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Di aplikasi sebenarnya, mungkin perlu mem-passing userId Admin yang benar.
                // Karena kita test-mode anonymous di browser sama, uid biasanya sama.
                // Namun untuk live production, Anda mungkin harus hardcode `userId` Admin.
                userId = user.uid; 
                fetchMasterData();
            }
        });

        function fetchMasterData() {
            // Ambil Nama Desa
            onSnapshot(collection(db, 'artifacts', appId, 'users', userId, 'lembaga'), snap => {
                if(!snap.empty) document.getElementById('header-lembaga').innerText = snap.docs[0].data().nama;
            });

            // Pantau Jadwal Ujian Aktif
            onSnapshot(collection(db, 'artifacts', appId, 'users', userId, 'jadwal'), snap => {
                const jadwalAktif = snap.docs.map(d=>({id: d.id, ...d.data()})).find(j => j.status === 'Aktif');
                
                if(!jadwalAktif) {
                    activeJadwal = null;
                    document.getElementById('screen-waiting').classList.remove('hidden');
                    document.getElementById('screen-live').classList.add('hidden');
                    document.getElementById('header-jadwal').innerText = "STANDBY";
                    if(unsubProgress) { unsubProgress(); unsubProgress = null; }
                    return;
                }

                // Jika ada jadwal aktif baru/berubah formasi
                if(!activeJadwal || activeJadwal.id !== jadwalAktif.id) {
                    activeJadwal = jadwalAktif;
                    document.getElementById('screen-waiting').classList.add('hidden');
                    document.getElementById('screen-live').classList.remove('hidden');
                    document.getElementById('header-jadwal').innerText = activeJadwal.nama;
                    document.getElementById('info-formasi').innerText = activeJadwal.formasi;

                    // Ambil Total Soal dari Materi untuk menghitung Persentase Bar
                    onSnapshot(collection(db, 'artifacts', appId, 'users', userId, 'materi'), snapMateri => {
                        const m = snapMateri.docs.map(d=>d.data()).find(x => snapMateri.docs.find(d=>d.id === activeJadwal.materiId));
                        if(m) {
                            totalSoalDiujikan = m.jumlahSoalTarget || (m.daftarSoal ? m.daftarSoal.length : 100);
                            document.getElementById('info-soal').innerText = totalSoalDiujikan;
                        }
                    });

                    // Ambil Peserta HANYA untuk formasi ini, buat elemen DOM awal
                    onSnapshot(collection(db, 'artifacts', appId, 'users', userId, 'peserta'), snapPeserta => {
                        dataPeserta = snapPeserta.docs.map(d=>({id: d.id, ...d.data()})).filter(p => p.formasi === activeJadwal.formasi);
                        inisialisasiKartuPeserta();
                    });

                    // PANTAU PROGRESS REAL-TIME DARI PESERTA
                    if(unsubProgress) unsubProgress();
                    const qProgress = query(collection(db, 'artifacts', appId, 'users', userId, 'live_progress'), where("jadwalId", "==", activeJadwal.id));
                    unsubProgress = onSnapshot(qProgress, snapProgress => {
                        const progressData = snapProgress.docs.map(d => d.data());
                        updatePergerakanKlasemen(progressData);
                    });
                }
            });
        }

        // Membuat elemen HTML peserta dengan posisi Absolute agar bisa dianimasikan X dan Y nya
        function inisialisasiKartuPeserta() {
            const container = document.getElementById('ranking-container');
            container.innerHTML = '';
            
            // Set tinggi container sesuai jumlah peserta
            container.style.height = `${dataPeserta.length * CARD_HEIGHT}px`;

            dataPeserta.forEach((p, index) => {
                // Posisi awal berurutan
                const initY = index * CARD_HEIGHT;

                container.innerHTML += `
                    <div id="card-${p.id}" class="absolute w-full h-24 bg-slate-800/80 backdrop-blur-md border border-slate-700 rounded-3xl p-4 lg:p-5 flex items-center gap-4 lg:gap-6 shadow-xl overflow-hidden transition-transform duration-[800ms] ease-in-out" style="transform: translateY(${initY}px);">
                        
                        <!-- Highlight Progress Background yang mengisi dari kiri ke kanan -->
                        <div id="bg-progress-${p.id}" class="absolute top-0 left-0 h-full bg-emerald-900/30 z-0 transition-all duration-[1000ms] ease-out border-r border-emerald-500/30 shadow-[5px_0_15px_rgba(16,185,129,0.1)]" style="width: 0%;"></div>
                        
                        <!-- Box Nomor Ranking -->
                        <div id="rank-box-${p.id}" class="relative z-10 w-12 h-12 lg:w-16 lg:h-16 rounded-2xl bg-slate-900 border-2 border-slate-700 flex items-center justify-center flex-shrink-0 shadow-inner transition-colors duration-500">
                            <span id="rank-${p.id}" class="text-xl lg:text-3xl font-black text-slate-500 transition-colors duration-500">-</span>
                        </div>
                        
                        <!-- Info Peserta & Progress Bar -->
                        <div class="relative z-10 flex-1 min-w-0">
                            <div class="flex items-end gap-3 mb-1">
                                <h3 class="text-lg lg:text-2xl font-black text-white uppercase tracking-wide leading-none truncate">${p.nama}</h3>
                                <p class="text-slate-400 font-mono text-xs lg:text-sm font-bold hidden sm:block">${p.noPeserta}</p>
                            </div>
                            
                            <div class="flex items-center gap-3 lg:gap-4 mt-2">
                                <div class="flex-1 bg-slate-900 h-2 lg:h-3 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                                    <div id="bar-${p.id}" class="h-full bg-gradient-to-r from-blue-500 via-emerald-400 to-emerald-300 rounded-full transition-all duration-1000 ease-out relative" style="width: 0%;">
                                        <div class="absolute inset-0 bg-white/20 w-full h-full animate-[shimmer_2s_infinite]"></div>
                                    </div>
                                </div>
                                <span id="dijawab-${p.id}" class="text-[10px] lg:text-xs font-black text-slate-300 w-12 lg:w-16 text-right font-mono">0/${totalSoalDiujikan}</span>
                            </div>
                        </div>

                        <!-- Skor Live Area -->
                        <div class="relative z-10 text-right pl-4 lg:pl-6 border-l border-slate-700/50 min-w-[80px] lg:min-w-[120px]">
                            <p class="text-[8px] lg:text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Skor Live</p>
                            <p id="skor-${p.id}" class="text-3xl lg:text-5xl font-mono font-black text-slate-600 transition-colors duration-500 drop-shadow-md">0</p>
                        </div>
                    </div>
                `;
            });
            feather.replace();
        }

        // FUNGSI INTI: Update Nilai & Gerakkan Kartu (Animasi Salip-menyalip)
        function updatePergerakanKlasemen(progressData) {
            if(dataPeserta.length === 0) return;

            // 1. Gabungkan data peserta dasar dengan data progress terbarunya (jika belum jawab, nilai 0)
            let rekapKlasemen = dataPeserta.map(p => {
                const prog = progressData.find(x => x.pesertaId === p.id);
                return {
                    id: p.id,
                    nilai: prog ? prog.nilai : 0,
                    dijawab: prog ? prog.dijawab : 0
                };
            });

            // 2. Sortir untuk menentukan Ranking saat ini
            rekapKlasemen.sort((a, b) => {
                if(b.nilai !== a.nilai) return b.nilai - a.nilai; // 1. Skor tertinggi
                return b.dijawab - a.dijawab; // 2. Kalau skor sama, yang jawab lebih banyak/cepat prioritas
            });

            // 3. Aplikasikan Animasi Pergerakan (TranslateY) dan Update Angka
            rekapKlasemen.forEach((data, index) => {
                const rankAsli = index + 1;
                const card = document.getElementById(`card-${data.id}`);
                
                if(card) {
                    // MENGGERAKKAN KARTU (ANIMASI BALAPAN)
                    // Y = index * Tinggi_Kartu
                    const targetY = index * CARD_HEIGHT;
                    card.style.transform = `translateY(${targetY}px)`;

                    // Update Nomor Ranking & Styling Emas untuk Juara 1
                    const rankBox = document.getElementById(`rank-box-${data.id}`);
                    const rankText = document.getElementById(`rank-${data.id}`);
                    rankText.innerText = rankAsli;

                    if(rankAsli === 1 && data.dijawab > 0) {
                        card.classList.replace('border-slate-700', 'border-amber-400');
                        card.classList.add('shadow-[0_0_20px_rgba(251,191,36,0.3)]');
                        rankBox.classList.replace('bg-slate-900', 'bg-amber-500');
                        rankBox.classList.replace('border-slate-700', 'border-amber-400');
                        rankText.classList.replace('text-slate-500', 'text-amber-900');
                    } else if (rankAsli === 2 && data.dijawab > 0) {
                        // Juara 2 Silver
                        card.classList.replace('border-amber-400', 'border-slate-700');
                        card.classList.remove('shadow-[0_0_20px_rgba(251,191,36,0.3)]');
                        rankBox.classList.replace('bg-amber-500', 'bg-slate-300');
                        rankBox.classList.replace('border-amber-400', 'border-slate-400');
                        rankBox.classList.replace('bg-slate-900', 'bg-slate-300');
                        rankBox.classList.replace('border-slate-700', 'border-slate-400');
                        rankText.classList.remove('text-amber-900', 'text-slate-500');
                        rankText.classList.add('text-slate-700');
                    } else {
                        // Sisanya Normal
                        card.classList.replace('border-amber-400', 'border-slate-700');
                        card.classList.remove('shadow-[0_0_20px_rgba(251,191,36,0.3)]');
                        
                        rankBox.classList.remove('bg-amber-500', 'bg-slate-300', 'border-amber-400', 'border-slate-400');
                        rankBox.classList.add('bg-slate-900', 'border-slate-700');
                        
                        rankText.classList.remove('text-amber-900', 'text-slate-700');
                        rankText.classList.add('text-slate-500');
                    }

                    // Update Skor (Beri warna terang hijau jika ada skor)
                    const skorEl = document.getElementById(`skor-${data.id}`);
                    // Hilangkan desimal jika .00 agar lebih bersih di proyektor (Opsional, di sini kita bulatkan integer atau 2 desimal)
                    const skorTampil = Number.isInteger(data.nilai) ? data.nilai : data.nilai.toFixed(2);
                    
                    skorEl.innerText = skorTampil;
                    if(data.nilai > 0) {
                        skorEl.classList.replace('text-slate-600', 'text-emerald-400');
                    }

                    // Update Progress Bar
                    const persen = totalSoalDiujikan > 0 ? (data.dijawab / totalSoalDiujikan) * 100 : 0;
                    document.getElementById(`bar-${data.id}`).style.width = `${persen}%`;
                    document.getElementById(`bg-progress-${data.id}`).style.width = `${persen}%`;
                    document.getElementById(`dijawab-${data.id}`).innerText = `${data.dijawab}/${totalSoalDiujikan}`;
                }
            });
        }
    </script>
    
    <!-- Animasi Shimmer untuk Progress Bar -->
    <style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</body>
</html>
